<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main emerald gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10a37f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2db896;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d8b6d;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9935a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Radial glow effect -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Circular background with gradient -->
  <circle cx="100" cy="100" r="100" fill="url(#emeraldGrad)"/>
  
  <!-- Inner glow circle -->
  <circle cx="100" cy="100" r="100" fill="url(#glowGrad)"/>
  
  <!-- Geometric layers representing documentation stacks -->
  
  <!-- Layer 1 (bottom) - tilted left -->
  <g opacity="0.85">
    <rect x="50" y="95" width="90" height="35" rx="4" fill="white" transform="skewX(-8)" filter="url(#shadow)"/>
    <line x1="55" y1="105" x2="130" y2="105" stroke="#10a37f" stroke-width="2" opacity="0.6"/>
    <line x1="55" y1="112" x2="125" y2="112" stroke="#e5e7eb" stroke-width="1.5"/>
    <line x1="55" y1="119" x2="125" y2="119" stroke="#e5e7eb" stroke-width="1.5"/>
  </g>
  
  <!-- Layer 2 (middle) - straight -->
  <g opacity="0.92">
    <rect x="45" y="70" width="100" height="38" rx="4" fill="white" filter="url(#shadow)"/>
    <line x1="52" y1="80" x2="138" y2="80" stroke="url(#emeraldGrad)" stroke-width="2.5"/>
    <line x1="52" y1="88" x2="133" y2="88" stroke="#e5e7eb" stroke-width="1.5"/>
    <line x1="52" y1="96" x2="133" y2="96" stroke="#e5e7eb" stroke-width="1.5"/>
    <line x1="52" y1="103" x2="128" y2="103" stroke="#e5e7eb" stroke-width="1.5"/>
  </g>
  
  <!-- Layer 3 (top) - tilted right -->
  <g opacity="1">
    <rect x="50" y="45" width="95" height="40" rx="4" fill="white" transform="skewX(6)" filter="url(#shadow)"/>
    <line x1="58" y1="56" x2="138" y2="56" stroke="#2db896" stroke-width="2.5"/>
    <line x1="58" y1="64" x2="135" y2="64" stroke="#d1d5db" stroke-width="1.5"/>
    <line x1="58" y1="72" x2="135" y2="72" stroke="#d1d5db" stroke-width="1.5"/>
  </g>
  
  <!-- Code bracket accent (< >) on top layer -->
  <g>
    <text x="142" y="82" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="url(#goldGrad)" opacity="0.85">&lt;</text>
    <text x="142" y="102" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="url(#goldGrad)" opacity="0.85">/</text>
    <text x="142" y="122" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="url(#goldGrad)" opacity="0.85">&gt;</text>
  </g>
  
  <!-- Connection dots between layers -->
  <circle cx="48" cy="107" r="2.5" fill="#10a37f" opacity="0.7"/>
  <circle cx="152" cy="84" r="2.5" fill="#2db896" opacity="0.7"/>
</svg>