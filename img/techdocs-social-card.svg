<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">TechDOCS social preview card</title>
  <desc id="desc">TechDOCS preview card highlighting technical writing best practices, API documentation, cloud architecture, and DevOps guidance.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5efe5" />
      <stop offset="38%" stop-color="#efe3d2" />
      <stop offset="100%" stop-color="#d9cab7" />
    </linearGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#121212" />
      <stop offset="100%" stop-color="#2f2f2f" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10a37f" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.16" />
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#201f1d" stroke-opacity="0.06" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.7" />

  <circle cx="1090" cy="88" r="182" fill="#ffffff" opacity="0.25" />
  <circle cx="1010" cy="548" r="250" fill="#10a37f" opacity="0.11" />
  <circle cx="78" cy="580" r="170" fill="#111111" opacity="0.06" />

  <g filter="url(#shadow)">
    <rect x="62" y="54" width="1076" height="522" rx="30" fill="#fffdf8" fill-opacity="0.78" />
  </g>

  <rect x="94" y="90" width="164" height="34" rx="17" fill="#111111" />
  <text x="176" y="113" text-anchor="middle" font-family="Red Hat Text, Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="1.8" fill="#f5efe5">TECHDOCS</text>

  <text x="94" y="212" font-family="Georgia, Times New Roman, serif" font-size="88" font-weight="700" fill="url(#ink)">Ship Better</text>
  <text x="94" y="298" font-family="Georgia, Times New Roman, serif" font-size="88" font-weight="700" fill="url(#ink)">Docs Faster</text>

  <text x="98" y="358" font-family="Red Hat Text, Segoe UI, sans-serif" font-size="28" font-weight="600" fill="#1e1e1e">Technical writing standards, API documentation,</text>
  <text x="98" y="396" font-family="Red Hat Text, Segoe UI, sans-serif" font-size="28" font-weight="600" fill="#1e1e1e">cloud architecture, and DevOps guidance that teams can use.</text>

  <rect x="94" y="454" width="294" height="64" rx="12" fill="url(#accent)" />
  <text x="241" y="494" text-anchor="middle" font-family="Red Hat Text, Segoe UI, sans-serif" font-size="26" font-weight="700" fill="#ffffff">techdocs.co.in</text>

  <g transform="translate(720 118)">
    <rect width="330" height="344" rx="24" fill="#111111" />
    <rect x="28" y="30" width="114" height="114" rx="22" fill="url(#accent)" />
    <path d="M66 87h38M85 68v38" stroke="#ffffff" stroke-width="10" stroke-linecap="round" />
    <text x="170" y="72" font-family="Red Hat Text, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="1.6" fill="#8be0cf">LEARN</text>
    <text x="170" y="106" font-family="Georgia, Times New Roman, serif" font-size="42" font-weight="700" fill="#ffffff">Write</text>
    <text x="170" y="144" font-family="Georgia, Times New Roman, serif" font-size="42" font-weight="700" fill="#ffffff">Deploy</text>
    <text x="170" y="182" font-family="Georgia, Times New Roman, serif" font-size="42" font-weight="700" fill="#ffffff">Improve</text>

    <rect x="28" y="234" width="274" height="2" fill="#ffffff" opacity="0.14" />

    <text x="28" y="276" font-family="Red Hat Text, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#d9d9d9">50+ guides</text>
    <text x="148" y="276" font-family="Red Hat Text, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#d9d9d9">API references</text>
    <text x="28" y="314" font-family="Red Hat Text, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#d9d9d9">Cloud patterns</text>
    <text x="176" y="314" font-family="Red Hat Text, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#d9d9d9">DevOps playbooks</text>
  </g>

  <text x="95" y="558" font-family="Red Hat Text, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="1.2" fill="#0f766e">MASTER DOCUMENTATION. MASTER YOUR CRAFT.</text>
</svg>
